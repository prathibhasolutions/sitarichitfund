<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sitari Chit Fund</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); padding: 32px 40px; }
        h1, h2 { color: #1a2e4a; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { padding: 10px 14px; border-bottom: 1px solid #e8ecf1; }
        th { background: #2a4d7a; color: #fff; font-weight: 600; }
        tr:nth-child(even) { background: #f7f9fc; }
        button, a.button { background: #e53935; color: #fff; border: none; padding: 7px 16px; border-radius: 5px; font-weight: 600; text-decoration: none; cursor: pointer; }
        button:hover, a.button:hover { background: #b71c1c; }
    </style>
</head>
<body>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
